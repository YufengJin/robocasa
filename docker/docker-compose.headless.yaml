# Headless mode: no GUI, for training / serving / testing.
#
# Usage:
#   docker compose -f docker/docker-compose.headless.yaml up --build
#   docker exec -it robocasa-headless bash

services:
  robocasa:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # Default image tag for local from-scratch builds. Override with `IMAGE=...`
    # to point at a registry tag (e.g. `IMAGE=<hub-user>/robocasa:latest docker compose up`).
    # `docker compose build` will tag the build output with this local tag.
    image: ${IMAGE:-yufengjin/robocasa:latest}
    container_name: robocasa-headless
    restart: unless-stopped
    tty: true
    stdin_open: true

    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # <<<EXTENSION_ENV_INSERT_ABOVE>>> — sub-skills insert env vars above this line

    network_mode: host
    ipc: host
    pid: host

    volumes:
      - ..:/workspace/robocasa
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      # <<<EXTENSION_VOLUME_INSERT_ABOVE>>> — sub-skills insert mounts above this line
      # Add dataset mounts:
      # - /path/to/datasets:/workspace/datasets:ro

    command: tail -f /dev/null

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]

    ulimits:
      nofile: { soft: 65536, hard: 65536 }
      nproc: 65536
      memlock: -1
      stack: 67108864
