# X11 mode: supports GUI display (MuJoCo, matplotlib, etc.).
#
# Pre-requisite on host:  xhost +local:docker
#
# Usage:
#   docker compose -f docker/docker-compose.x11.yaml up --build
#   docker exec -it robocasa-gui bash

services:
  robocasa-gui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # Default image tag for local from-scratch builds. Override with `IMAGE=...`
    # to point at a registry tag (e.g. `IMAGE=<hub-user>/robocasa:latest docker compose up`).
    image: ${IMAGE:-yufengjin/robocasa:latest}
    container_name: robocasa-gui
    restart: unless-stopped
    tty: true
    stdin_open: true

    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # Force matplotlib to a non-GUI backend. With DISPLAY set, matplotlib
      # otherwise selects TkAgg → needs python3-tk which is not installed.
      # Benchmark-native viewers (IsaacGym / MuJoCo / SAPIEN) use their own
      # OpenGL / Vulkan stacks and are NOT affected.
      - MPLBACKEND=Agg
      # <<<EXTENSION_ENV_INSERT_ABOVE>>> — sub-skills insert env vars above this line

    volumes:
      - ..:/workspace/robocasa
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
      # <<<EXTENSION_VOLUME_INSERT_ABOVE>>> — sub-skills insert mounts above this line
      # Add dataset mounts:
      # - /path/to/datasets:/workspace/datasets:ro

    network_mode: host
    ipc: host
    pid: host

    command: tail -f /dev/null

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]

    ulimits:
      nofile: { soft: 65536, hard: 65536 }
      nproc: 65536
      memlock: -1
      stack: 67108864
